services:

  # ── Backend Node.js ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idealclean-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATA_DIR: /app/data
    volumes:
      # Volum persistent pentru SQLite — datele supraviețuiesc restart-urilor
      - db_data:/app/data
    networks:
      - idealclean-net
    # Portul 5000 NU e expus public — accesibil doar intern prin Nginx
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend Nginx ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: idealclean-frontend
    restart: unless-stopped
    ports:
      # Port public — accesibil din exterior
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - idealclean-net

# ── Rețea internă ─────────────────────────────────────────────────────────────
networks:
  idealclean-net:
    driver: bridge

# ── Volume persistente ────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
